<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>単語帳</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>

<script defer src="math.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<h1>単語帳</h1>

<div id="question" class="card">
読み込み中...
</div>

<div id="answer" class="card" style="display:none;">
</div>

<div class="button-area">

<button onclick="showAnswer()">
答えを見る
</button>

<button onclick="nextCard()">
次の問題
</button>

</div>

</body>
</html>
