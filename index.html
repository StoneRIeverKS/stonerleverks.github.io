<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>単語帳</title>

<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$']]
    }
};
</script>

<script
src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
async>
</script>

<style>

body{
    font-family:sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.tab-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-bar button{
    flex:1;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    min-height:120px;
    margin-bottom:15px;
}

#answer{
    display:none;
}

textarea{
    width:100%;
    min-height:100px;
}

button{
    padding:10px;
    margin-top:10px;
}

.list-item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

</style>

</head>
<body>

<h1>単語帳</h1>

<div class="tab-bar">
    <button onclick="showPage('study')">学習</button>
    <button onclick="showPage('add')">追加</button>
    <button onclick="showPage('manage')">管理</button>
</div>

<!-- 学習 -->

<div id="study" class="page active">

    <div id="question" class="card">
        問題
    </div>

    <div id="answer" class="card">
        答え
    </div>

    <button onclick="showAnswer()">
        答えを見る
    </button>

    <button onclick="nextCard()">
        次の問題
    </button>

</div>

<!-- 追加 -->

<div id="add" class="page">

    <h2>問題</h2>

    <textarea id="newQuestion"></textarea>

    <h2>答え</h2>

    <textarea id="newAnswer"></textarea>

    <button onclick="addCard()">
        登録
    </button>

</div>

<!-- 管理 -->

<div id="manage" class="page">

    <div id="cardList"></div>

</div>

<script>

let cards = [];
let currentCard = null;

function initializeCards(){

    const saved =
        localStorage.getItem("cards");

    if(saved){

        cards = JSON.parse(saved);

    }else{

        cards = [
            {
                question:"$E[X]$",
                answer:"$\\sum_x xP(X=x)$"
            },
            {
                question:"ポアソン分布の期待値",
                answer:"$\\lambda$"
            }
        ];

        saveCards();
    }
}

function saveCards(){

    localStorage.setItem(
        "cards",
        JSON.stringify(cards)
    );
}

function showPage(pageId){

    document
        .querySelectorAll(".page")
        .forEach(page => {
            page.classList.remove("active");
        });

    document
        .getElementById(pageId)
        .classList.add("active");

    if(pageId === "manage"){
        renderCardList();
    }
}

function nextCard(){

    if(cards.length === 0){
        return;
    }

    currentCard =
        cards[
            Math.floor(
                Math.random() * cards.length
            )
        ];

    document
        .getElementById("question")
        .innerHTML =
        currentCard.question;

    document
        .getElementById("answer")
        .innerHTML =
        currentCard.answer;

    document
        .getElementById("answer")
        .style.display =
        "none";

    MathJax.typesetPromise();
}

function showAnswer(){

    document
        .getElementById("answer")
        .style.display =
        "block";

    MathJax.typesetPromise();
}

function addCard(){

    const question =
        document
        .getElementById("newQuestion")
        .value
        .trim();

    const answer =
        document
        .getElementById("newAnswer")
        .value
        .trim();

    if(!question || !answer){

        alert("問題と答えを入力してください");

        return;
    }

    cards.push({
        question,
        answer
    });

    saveCards();

    document
        .getElementById("newQuestion")
        .value = "";

    document
        .getElementById("newAnswer")
        .value = "";

    alert("登録しました");

    renderCardList();
}

function renderCardList(){

    const cardList =
        document
        .getElementById("cardList");

    cardList.innerHTML = "";

    cards.forEach((card,index)=>{

        const div =
            document.createElement("div");

        div.className =
            "list-item";

        div.innerHTML =
            `
            <strong>${index+1}</strong><br>
            ${escapeHtml(card.question)}
            `;

        cardList.appendChild(div);
    });
}

function escapeHtml(text){

    const div =
        document.createElement("div");

    div.textContent = text;

    return div.innerHTML;
}

initializeCards();
nextCard();

</script>

</body>
</html>
